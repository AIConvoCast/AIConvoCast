name: Manual AI Podcast Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" >> $GITHUB_ENV
          echo "SHARE_SHEET_WITH_EMAIL=${{ secrets.SHARE_SHEET_WITH_EMAIL }}" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "CUSTOM_TOPIC=" >> $GITHUB_ENV
          echo "WORKFLOW_ID=" >> $GITHUB_ENV

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          SHARE_SHEET_WITH_EMAIL=${{ secrets.SHARE_SHEET_WITH_EMAIL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: Write Google credentials file
        run: |
          echo '${{ secrets.GOOGLE_CREDS_JSON }}' > jmio-google-api.json
        # Store your Google service account JSON as a secret named GOOGLE_CREDS_JSON

      - name: Test Environment Variables
        run: python test_env_vars.py

      - name: Run AI Podcast Pipeline
        run: python ai_podcast_pipeline_for_cursor.py
